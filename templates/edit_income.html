{% extends "base.html" %}
{% block title %}Edit Income — Ledger{% endblock %}
{% block page_title %}Edit Income{% endblock %}
{% block page_subtitle %}Update this income entry{% endblock %}

{% block content %}
<div class="panel form-card">
  <form method="POST" action="{{ url_for('edit_income', income_id=income['id']) }}">
    <div class="field">
      <label for="source">Source</label>
      <input type="text" id="source" name="source" value="{{ income['source'] }}" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0.01" name="amount" value="{{ income['amount'] }}" required>
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" value="{{ income['date'] }}" required>
      </div>
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="2">{{ income['description'] or '' }}</textarea>
    </div>
    <div style="display:flex; gap:12px; margin-top:22px;">
      <button type="submit" class="btn btn-accent">Save Changes</button>
      <a href="{{ url_for('income') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
