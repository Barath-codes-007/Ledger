{% extends "base.html" %}
{% block title %}Add Expense — Ledger{% endblock %}
{% block page_title %}Add Expense{% endblock %}
{% block page_subtitle %}Log a new transaction{% endblock %}

{% block content %}
<div class="panel form-card">
  <form method="POST" action="{{ url_for('add_expense') }}" enctype="multipart/form-data">
    <div class="field">
      <label>Category</label>
      <div class="category-picker">
        {% for c in categories %}
        <label>
          <input type="radio" name="category" value="{{ c }}" {{ 'checked' if loop.first }}>
          <div class="cat-tile">
            <i class="fa-solid {{ category_icons[c] }}"></i>
            <span>{{ c }}</span>
          </div>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="field" id="customCategoryField" style="display:none;">
      <label for="custom_category">Custom category name</label>
      <input type="text" id="custom_category" name="custom_category" placeholder="e.g. Pet Care">
    </div>

    <div class="field-row">
      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0.01" name="amount" placeholder="0.00" required>
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" value="{{ now_year }}-01-01" required>
      </div>
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="2" placeholder="What was this for?"></textarea>
    </div>

    <div class="field">
      <label for="payment_mode">Payment mode</label>
      <select id="payment_mode" name="payment_mode">
        {% for p in payment_modes %}
        <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label>Receipt (optional)</label>
      <label for="receipt" class="upload-drop">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        Click to upload a receipt image or PDF (max 5MB)
      </label>
      <input type="file" id="receipt" name="receipt" accept=".png,.jpg,.jpeg,.gif,.webp,.pdf" style="display:none;">
    </div>

    <div style="display:flex; gap:12px; margin-top:22px;">
      <button type="submit" class="btn btn-accent">Save Expense</button>
      <a href="{{ url_for('expenses') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

<script>
document.getElementById('date').valueAsDate = new Date();
document.getElementById('receipt').addEventListener('change', function(e) {
  const label = document.querySelector('.upload-drop');
  if (e.target.files.length) {
    label.innerHTML = '<i class="fa-solid fa-circle-check"></i> ' + e.target.files[0].name;
  }
});
</script>
{% endblock %}
